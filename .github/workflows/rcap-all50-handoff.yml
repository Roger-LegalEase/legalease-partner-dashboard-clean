name: RCAP All50 Handoff Verification

on:
  pull_request:
    branches:
      - main
    paths:
      - docs/RCAP_*/**
      - docs/rcap/**
      - docs/RCAP_*.md
      - docs/LegalEase-Master-Build-Plan-v2.md/**
      - private/Nationwide Record Clearing/**
      - scripts/*all50*.mjs
      - scripts/*all51*.mjs
      - scripts/*rcap*.mjs
      - scripts/*record-clearing*.mjs
      - scripts/verify-*-state-pack.mjs
      - scripts/verify-*-pleading-state.mjs
      - scripts/verify-*-document-generator.mjs
      - scripts/verify-encrypted-pdf-rescue.mjs
      - scripts/verify-official-pdf-*.mjs
      - src/app/internal/record-clearing/**
      - src/lib/rcap/**
      - src/lib/rcap-intake/**
      - src/lib/record-clearing/**
      - package.json
      - package-lock.json
      - .github/workflows/rcap-all50-handoff.yml
  push:
    branches:
      - feat/rcap-all50-qa-attorney-handoff

permissions:
  contents: read

jobs:
  verify:
    name: Verify RCAP all50 handoff
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'feat/expungement-ai') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Verify all50 build
        run: npm run rcap:verify-all50-build

      - name: Verify all50 state packs
        run: npm run rcap:verify-all50-state-packs

      - name: Verify overlay factory
        run: npm run rcap:verify-overlay-factory

      - name: Verify all50 review artifacts
        run: npm run rcap:verify-all50-review-artifacts

      - name: Verify all50 internal preview
        run: npm run rcap:verify-all50-internal-preview

      - name: Verify all50 handoff
        run: npm run rcap:verify-all50-handoff
