name: RCAP All50 Handoff Verification

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feat/rcap-all50-qa-attorney-handoff

permissions:
  contents: read

jobs:
  verify:
    name: Verify RCAP all50 handoff
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect CI scope
        id: scope
        run: node scripts/detect-ci-scope.mjs --github-output

      - name: Skip RCAP handoff when RCAP is not affected
        if: ${{ steps.scope.outputs.rcapAffected != 'true' }}
        run: echo "RCAP not affected; skipping RCAP handoff verification."

      - name: Set up Node
        if: ${{ steps.scope.outputs.rcapAffected == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.scope.outputs.rcapAffected == 'true' }}
        run: npm ci

      - name: Lint
        if: ${{ steps.scope.outputs.rcapAffected == 'true' }}
        run: npm run lint

      - name: Typecheck
        if: ${{ steps.scope.outputs.rcapAffected == 'true' }}
        run: npm run typecheck

      - name: Test
        if: ${{ steps.scope.outputs.rcapAffected == 'true' }}
        run: npm test

      - name: Verify all50 build
        if: ${{ steps.scope.outputs.rcapAffected == 'true' }}
        run: npm run rcap:verify-all50-build

      - name: Verify all50 state packs
        if: ${{ steps.scope.outputs.rcapAffected == 'true' }}
        run: npm run rcap:verify-all50-state-packs

      - name: Verify overlay factory
        if: ${{ steps.scope.outputs.rcapAffected == 'true' }}
        run: npm run rcap:verify-overlay-factory

      - name: Verify all50 review artifacts
        if: ${{ steps.scope.outputs.rcapAffected == 'true' }}
        run: npm run rcap:verify-all50-review-artifacts

      - name: Verify all50 internal preview
        if: ${{ steps.scope.outputs.rcapAffected == 'true' }}
        run: npm run rcap:verify-all50-internal-preview

      - name: Verify all50 handoff
        if: ${{ steps.scope.outputs.rcapAffected == 'true' }}
        run: npm run rcap:verify-all50-handoff
