name: Expungement.ai Consumer Adapter Verification

on:
  pull_request:
    branches:
      - main
    paths:
      - src/app/api/expungement-ai/**
      - src/app/api/expungement-ai/wilma/**
      - src/app/expungement-ai/**
      - src/app/briefcase/**
      - src/lib/expungement-ai/**
      - src/lib/expungement-ai/wilma*.ts
      - supabase/phase-26-consumer-briefcase-items.sql
      - supabase/phase-27-consumer-checkout-metadata.sql
      - supabase/phase-28-consumer-packet-generation-status.sql
      - supabase/phase-29-consumer-wilma-telemetry.sql
      - supabase/phase-31-legalease-os-support-queue.sql
      - docs/EXPUNGEMENT_AI_CONSUMER_ADAPTER.md
      - docs/EXPUNGEMENT_AI_PRODUCTION_READINESS.md
      - docs/EXPUNGEMENT_AI_MANUAL_SMOKE_TESTS.md
      - design-handoff/expungement-ai-frontend/**
      - scripts/verify-expungement-consumer-adapter.mjs
      - scripts/verify-expungement-consumer-persistence.mjs
      - scripts/verify-expungement-consumer-checkout.mjs
      - scripts/verify-expungement-post-payment-packet-generation.mjs
      - scripts/verify-expungement-production-readiness.mjs
      - scripts/verify-expungement-launch-polish.mjs
      - scripts/verify-wilma-safety-harness.mjs
      - package.json
      - package-lock.json
      - .github/workflows/expungement-ai-consumer-adapter.yml
  push:
    branches:
      - feat/expungement-ai-consumer-adapter
      - feat/expungement-ai-post-payment-packet-generation
      - feat/expungement-ai-wilma-safety-harness

permissions:
  contents: read

jobs:
  verify:
    name: Verify Expungement.ai consumer adapter
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies from lockfile
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Install dependencies without lockfile
        if: ${{ hashFiles('package-lock.json') == '' }}
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Verify all51 launch-enabled
        run: npm run rcap:verify-all51-launch-enabled

      - name: Verify all51 final approval
        run: npm run rcap:verify-all51-final-approval

      - name: Verify encrypted PDF rescue
        run: npm run rcap:verify-encrypted-pdf-rescue

      - name: Verify Expungement.ai consumer adapter
        run: npm run expungement:verify-consumer-adapter

      - name: Verify Expungement.ai consumer persistence
        run: npm run expungement:verify-consumer-persistence

      - name: Verify Expungement.ai consumer checkout
        run: npm run expungement:verify-consumer-checkout

      - name: Verify Expungement.ai post-payment packet generation
        run: npm run expungement:verify-post-payment-packet-generation

      - name: Verify Expungement.ai Wilma safety harness
        run: npm run expungement:verify-wilma-safety-harness
